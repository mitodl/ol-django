---
name: CI
on: [push, workflow_dispatch]

jobs:
  changelog:
    runs-on: ubuntu-24.04
    name: Check for required changelogs
    if: ${{ !contains(github.event.head_commit.author, 'renovate') }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0   # fetch all history

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Install dependencies
      run: uv sync

    - name: Changelog
      run: uv run scripts/changelog.py check


  tests:
    runs-on: ubuntu-24.04
    name: Python tests (Python ${{ matrix.python-version}}, Django ${{ matrix.django-version
      }})
    strategy:
      matrix:
        python-version:
        - "3.11"
        - "3.12"
        - "3.13"
        django-version:
        - "4.2"
        - "5.0"
        - "5.1"
        - "5.2"
        exclude:
        - python-version: "3.13"
          django-version: "4.2"
        - python-version: "3.13"
          django-version: "5.0"

    # Service containers to run
    services:
      postgres:
        image: postgres@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          # Maps tcp port 5432 on service container to the host
        - 5432:5432

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0   # fetch all history

    - name: Apt update
      run: sudo apt-get update

    - name: Apt install
      run: sudo apt-get install -y libxmlsec1-dev

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    - name: Pin python-version ${{ matrix.python-version }}
      run: uv python pin ${{ matrix.python-version }}

    - name: Install tox
      run: uv tool install tox --with tox-uv

    - name: Install dependencies
      run: uv sync

    - name: Tests
      env:
        TOXENV: 'py${{ matrix.python-version }}-django${{ matrix.django-version }}'

      run: |
        TOXENV=${{ env.TOXENV }}
        TOXENV=${TOXENV//.} # replace all dots
        tox

      # - name: Upload coverage to CodeCov
      #   uses: codecov/codecov-action@v1
      #   with:
      #     directory: ${{ matrix.app-name }}/coverage/
      #     flags: ${{ matrix.app-name }}

  release:
    needs: tests
    name: Publish to PyPI
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

    # extract the app name out of the tag's ref value
    - id: get-app-name
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const appName = context.ref.match(/refs\/tags\/([a-z\-]+)\/v\S+$/)[1]
          core.setOutput('app-name', appName)
          core.setOutput('app-package', appName.replace("mitol-django-", "").replace(/-/g, "_"))

    - name: Build
      run: PYTHONPATH=build-support/bin uv build "src/${{steps.get-app-name.outputs.app-package}}"

    - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_TOKEN }}
