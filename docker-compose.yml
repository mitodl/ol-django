---
services:

  db:
    image: postgres@sha256:29ee7bb30d804447dc9a91fd0d74322ae1dc3a4072cc6346f70a5ed6e783b565
    environment:
      POSTGRES_DB: ol_django
      POSTGRES_PASSWORD: postgres
    ports:
    - "${POSTGRES_PORT:-55432}:5432"

  redis:
    image: redis@sha256:832d7785830f3f4b559300e6191fc914b15642c1935252338825cf4332200148
    ports:
    - "${REDIS_PORT:-36379}:6379"

  shell:
    build:
      target: uv
    volumes:
    - .:/home/dev/src
    - cache:/home/dev/.cache/
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
    depends_on:
    - db

  release:
    build:
      target: release
    volumes:
    - cache:/home/dev/.cache/
    - ./ssh:/home/dev/.ssh:ro
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
    depends_on:
    - db

volumes:
  cache:
